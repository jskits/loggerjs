<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoggerJS Support Export</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.5;
        color: #1f2933;
        background: #f6f7f9;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 20px;
      }

      h1 {
        margin: 0 0 24px;
        font-size: 34px;
        line-height: 1.1;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
      }

      button {
        min-height: 40px;
        border: 1px solid #b8c1cc;
        border-radius: 6px;
        padding: 0 14px;
        color: #102a43;
        background: #ffffff;
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        border-color: #0f766e;
        color: #ffffff;
        background: #0f766e;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }

      .stat {
        border: 1px solid #d7dee7;
        border-radius: 8px;
        padding: 14px;
        background: #ffffff;
      }

      .stat span {
        display: block;
        color: #64748b;
        font-size: 13px;
      }

      .stat strong {
        display: block;
        margin-top: 4px;
        font-size: 24px;
      }

      pre {
        min-height: 220px;
        overflow: auto;
        border: 1px solid #d7dee7;
        border-radius: 8px;
        margin: 0;
        padding: 16px;
        color: #dbeafe;
        background: #1f2933;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>LoggerJS Support Export</h1>

      <div class="toolbar">
        <button id="add">Add log</button>
        <button id="add-error">Add error</button>
        <button id="export" class="primary">Export ZIP</button>
        <button id="clear">Clear</button>
      </div>

      <section class="stats" aria-label="Support log stats">
        <div class="stat">
          <span>Persisted</span>
          <strong id="count">0</strong>
        </div>
        <div class="stat">
          <span>Sessions</span>
          <strong id="sessions">0</strong>
        </div>
        <div class="stat">
          <span>Last export</span>
          <strong id="last-export">None</strong>
        </div>
      </section>

      <pre id="preview" aria-live="polite">[]</pre>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
