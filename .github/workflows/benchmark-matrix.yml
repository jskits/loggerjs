name: Benchmark Matrix

on:
  workflow_dispatch:
    inputs:
      runs:
        description: Number of A/B samples per runtime
        default: "5"
        required: true
      rounds:
        description: Rounds per A/B sample
        default: "120"
        required: true
      batch:
        description: Operations per contender per round
        default: "5000"
        required: true
      warmup:
        description: Warmup operations per contender
        default: "100000"
        required: true

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.19.0
          - 22
          - 24
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Run benchmark matrix sample
        run: >
          pnpm bench:matrix --
          --runs="${{ inputs.runs }}"
          --rounds="${{ inputs.rounds }}"
          --batch="${{ inputs.batch }}"
          --warmup="${{ inputs.warmup }}"
          --label="github-ubuntu-x64-node${{ matrix.node-version }}"

      - uses: actions/upload-artifact@v6
        with:
          name: benchmark-matrix-linux-x64-node-${{ matrix.node-version }}
          path: benchmarks/matrix/*

  aggregate:
    runs-on: ubuntu-latest
    needs: collect
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/download-artifact@v6
        with:
          path: benchmarks/ci-matrix

      - name: Aggregate benchmark matrix
        run: node scripts/bench-matrix.mjs aggregate benchmarks/ci-matrix --out benchmark-matrix-ci.md

      - uses: actions/upload-artifact@v6
        with:
          name: benchmark-matrix-aggregate
          path: benchmark-matrix-ci.md
