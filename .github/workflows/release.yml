name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error title=Release tag is not on main::Release tags must point at commits reachable from origin/main."
            exit 1
          fi

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use npm CLI with trusted publishing support
        run: |
          npm install -g npm@11
          npm --version

      - run: pnpm install --frozen-lockfile
      - run: pnpm check

      - name: Detect pending changesets
        id: changesets
        run: |
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Block publish with pending changesets
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          echo "Pending changesets must be versioned and committed before tagging a release."
          exit 1

      - name: Verify trusted publishing configuration
        run: |
          {
            echo "### npm Trusted Publisher"
            echo
            echo "This release publishes through npm Trusted Publisher/OIDC."
            echo
            echo "- npm package settings must trust \`jskits/loggerjs\` via workflow \`release.yml\`."
            echo "- The workflow has \`permissions.id-token: write\` so npm can exchange the GitHub OIDC token during \`npm publish\`."
            echo "- No \`NPM_AUTH_TOKEN\`, \`NPM_TOKEN\`, or \`NODE_AUTH_TOKEN\` publish secret is used."
            echo
            echo "\`npm whoami\` is intentionally skipped because OIDC authentication only exists during the publish operation."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify npm OIDC access
        run: pnpm release:publish:preflight

      - name: Publish dry run
        run: pnpm release:publish:dry-run
        env:
          NPM_CONFIG_PROVENANCE: "true"

      - name: Publish packages
        run: pnpm release:publish
        env:
          NPM_CONFIG_PROVENANCE: "true"

      - name: Push release tags
        run: |
          pnpm exec changeset tag
          git push origin 'refs/tags/@loggerjs/*:refs/tags/@loggerjs/*'
