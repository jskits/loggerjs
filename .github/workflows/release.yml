name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: Publish packages to npm after validation
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Use npm trusted publishing CLI
        run: |
          npm install -g npm@11
          npm --version

      - run: pnpm install --frozen-lockfile
      - run: pnpm check

      - name: Detect pending changesets
        id: changesets
        run: |
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: github.event_name == 'push' && steps.changesets.outputs.has_changesets == 'true'
        run: |
          pnpm version-packages
          if [ -z "$(git status --porcelain)" ]; then
            echo "changeset version produced no files to commit"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit --no-verify -m "chore(release): version packages"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Block publish with pending changesets
        if: github.event_name == 'workflow_dispatch' && inputs.publish && steps.changesets.outputs.has_changesets == 'true'
        run: |
          echo "Pending changesets must be versioned before publishing."
          exit 1

      - name: Validate npm publish token
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish && steps.changesets.outputs.has_changesets == 'false')
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            {
              echo "### Missing npm publish token"
              echo
              echo "The release job cannot read \`NPM_AUTH_TOKEN\` or \`NPM_TOKEN\`."
              echo
              echo "If the token is configured as an organization secret, check that its repository access includes \`jskits/loggerjs\`. Public repositories are not covered by a private-repositories-only policy."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=NPM publish token is unavailable::Configure NPM_AUTH_TOKEN as a repository secret or grant the organization secret access to jskits/loggerjs."
            exit 1
          fi

          if ! npm_user="$(npm whoami --registry=https://registry.npmjs.org 2>&1)"; then
            {
              echo "### npm authentication failed"
              echo
              echo "The release job received a token, but npm rejected it."
              echo
              echo "Use an npm granular access token with read/write publish access to the \`@loggerjs\` scope and bypass 2FA enabled."
              echo
              echo "\`\`\`"
              printf '%s\n' "$npm_user"
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=NPM authentication failed::npm whoami rejected the configured token."
            exit 1
          fi

          echo "Authenticated to npm as ${npm_user}."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN || secrets.NPM_TOKEN }}

      - name: Publish dry run
        if: github.event_name == 'push' || steps.changesets.outputs.has_changesets == 'false'
        run: pnpm publish -r --dry-run --access public --no-git-checks --json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN || secrets.NPM_TOKEN }}

      - name: Publish packages
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish && steps.changesets.outputs.has_changesets == 'false')
        run: pnpm exec changeset publish --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN || secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Push release tags
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish && steps.changesets.outputs.has_changesets == 'false')
        run: |
          pnpm exec changeset tag
          git push --follow-tags
